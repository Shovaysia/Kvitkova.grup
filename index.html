<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Квіткова Мафія — HR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --pink: #E8547A;
  --pink-dark: #C93D62;
  --pink-light: #FFF0F4;
  --pink-mid: #F9C5D1;
  --dark: #1A1A2E;
  --gray: #6B7280;
  --gray-light: #F3F4F6;
  --border: #E5E7EB;
  --white: #FFFFFF;
  --green: #10B981;
  --green-light: #ECFDF5;
  --amber: #F59E0B;
  --amber-light: #FFFBEB;
  --red: #EF4444;
  --red-light: #FEF2F2;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 16px rgba(232,84,122,0.08);
  --shadow-card: 0 1px 8px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8F9FB;color:var(--dark);min-height:100vh;overflow-x:hidden}

/* ── AUTH ── */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#FFF0F4 0%,#FFF 60%)}
.auth-logo{font-size:56px;margin-bottom:8px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.auth-brand{font-size:24px;font-weight:700;color:var(--dark);margin-bottom:4px;letter-spacing:-.3px}
.auth-sub{font-size:14px;color:var(--gray);margin-bottom:36px}
.auth-card{background:var(--white);border-radius:24px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(232,84,122,0.12)}
.auth-tabs{display:flex;background:var(--gray-light);border-radius:var(--radius-sm);padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;color:var(--gray);transition:all .2s}
.auth-tab.active{background:var(--white);color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.field{margin-bottom:16px}
.field label{font-size:12px;font-weight:600;color:var(--gray);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.4px}
.field input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--white);color:var(--dark);outline:none;transition:border .2s,box-shadow .2s}
.field input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(232,84,122,.1)}
.btn-primary{width:100%;padding:15px;background:var(--pink);color:white;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.2px}
.btn-primary:active{background:var(--pink-dark);transform:scale(.98)}
.btn-primary:disabled{opacity:.5}
.auth-msg{font-size:13px;margin-top:12px;text-align:center;padding:10px;border-radius:var(--radius-sm)}
.auth-msg.error{background:var(--red-light);color:var(--red)}
.auth-msg.success{background:var(--green-light);color:var(--green)}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--white);padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.topbar-inner{display:flex;align-items:center;justify-content:space-between}
.topbar-brand{font-size:17px;font-weight:700;color:var(--dark);display:flex;align-items:center;gap:8px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--pink-light),var(--pink-mid));color:var(--pink);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--pink-mid)}
.store-pill{font-size:11px;color:var(--gray);background:var(--gray-light);padding:3px 10px;border-radius:20px;margin-top:5px;display:inline-flex;align-items:center;gap:4px}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;gap:2px;border:none;background:none;cursor:pointer;color:var(--gray);transition:color .15s;position:relative}
.nav-btn.active{color:var(--pink)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--pink);border-radius:2px}
.nav-icon{font-size:22px;line-height:1;transition:transform .2s}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.nav-label{font-size:10px;font-weight:500}

/* ── PAGES & ANIMATIONS ── */
.page{display:none;padding:16px 16px 90px;animation:pageIn .25s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTION TITLES ── */
.section-title{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;margin-top:24px;display:flex;align-items:center;justify-content:space-between}
.section-title:first-child{margin-top:0}

/* ── TYPE TABS ── */
.type-tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.type-tabs::-webkit-scrollbar{display:none}
.type-tab{padding:9px 18px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer;background:var(--white);color:var(--gray);transition:all .2s}
.type-tab.active{background:var(--pink);color:white;border-color:var(--pink);box-shadow:0 4px 12px rgba(232,84,122,.25)}

/* ── PROGRESS ── */
.progress-wrap{background:var(--white);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow-card)}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-label{font-size:13px;color:var(--gray)}
.progress-pct{font-size:18px;font-weight:800;color:var(--pink)}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--pink-dark));border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── TASK CARDS ── */
.task-card{background:var(--white);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow-card);overflow:hidden;transition:transform .15s,box-shadow .15s}
.task-card:active{transform:scale(.98);box-shadow:none}
.task-row{display:flex;align-items:center;gap:14px;padding:16px}
.task-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s cubic-bezier(.4,0,.2,1)}
.task-check.done{background:var(--green);border-color:var(--green);animation:checkPop .3s cubic-bezier(.4,0,.2,1)}
@keyframes checkPop{0%{transform:scale(.8)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.task-check.done::after{content:'✓';color:white;font-size:14px;font-weight:700}
.task-text{font-size:15px;flex:1;line-height:1.4}
.task-text.done{text-decoration:line-through;color:var(--gray)}
.task-delete{padding:4px 8px;color:var(--border);font-size:18px;cursor:pointer;transition:color .2s}
.task-delete:active{color:var(--red)}

/* ── ADD TASK ── */
.add-task-btn{width:100%;padding:14px;background:var(--white);border:2px dashed var(--pink-mid);border-radius:var(--radius);font-size:14px;font-weight:500;color:var(--pink);cursor:pointer;text-align:center;margin-top:8px;transition:all .2s}
.add-task-btn:active{background:var(--pink-light)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--white);border-radius:24px 24px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:500px;animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;outline:none;margin-bottom:12px;transition:border .2s}
.modal-input:focus{border-color:var(--pink)}
.modal-actions{display:flex;gap:10px}
.btn-cancel{flex:1;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--white);cursor:pointer;font-weight:500}
.btn-add{flex:2;padding:14px;background:var(--pink);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer}

/* ── EMPLOYEE CARDS ── */
.emp-card{background:var(--white);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-card);display:flex;align-items:center;gap:14px;transition:transform .15s}
.emp-card:active{transform:scale(.98)}
.emp-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pink-light),var(--pink-mid));color:var(--pink);font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.emp-name{font-size:15px;font-weight:600}
.emp-role{font-size:12px;color:var(--gray);margin-top:2px}
.emp-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-left:auto;white-space:nowrap}
.badge-admin{background:rgba(232,84,122,.12);color:var(--pink)}
.badge-manager{background:var(--amber-light);color:var(--amber)}
.badge-staff{background:var(--green-light);color:var(--green)}
.badge-pending{background:var(--gray-light);color:var(--gray)}

/* ── OVERVIEW ── */
.overview-card{background:var(--white);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow-card)}
.overview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.overview-store{font-size:16px;font-weight:700}
.overview-pct{font-size:24px;font-weight:800}
.mini-progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:12px}
.mini-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.overview-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(--gray-light);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-num{font-size:20px;font-weight:800}
.stat-lbl{font-size:10px;color:var(--gray);font-weight:500;margin-top:2px}

/* ── PENDING USERS ── */
.pending-card{background:var(--amber-light);border:1.5px solid rgba(245,158,11,.2);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.pending-email{font-size:14px;font-weight:600;margin-bottom:12px}
.assign-row{display:flex;gap:8px}
.assign-select{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--white);outline:none}
.assign-select:focus{border-color:var(--pink)}
.btn-assign{padding:10px 16px;background:var(--pink);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}

/* ── WAITING SCREEN ── */
.waiting-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:24px}
.waiting-icon{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
.waiting-title{font-size:20px;font-weight:700;margin-bottom:8px}
.waiting-sub{font-size:14px;color:var(--gray);line-height:1.6}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--gray)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty-text{font-size:15px}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:white;padding:12px 20px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SPINNER ── */
.spinner{width:32px;height:32px;border:3px solid var(--pink-mid);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite;margin:48px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DESKTOP ── */
@media(min-width:768px){
  body{background:#F0F2F5}
  #app{max-width:480px;margin:0 auto;box-shadow:0 0 60px rgba(0,0,0,.1);border-radius:0;min-height:100vh;background:#F8F9FB}
  .topbar,.bottom-nav{max-width:480px}
  .bottom-nav{left:50%;transform:translateX(-50%)}
  #auth-screen{background:linear-gradient(160deg,#F0F2F5 0%,#E8EBF0 100%)}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">🌸</div>
  <div class="auth-brand">Квіткова Мафія</div>
  <div class="auth-sub">HR-портал</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login',this)">Вхід</div>
      <div class="auth-tab" onclick="switchAuthTab('register',this)">Реєстрація</div>
    </div>
    <div id="tab-login">
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com" autocomplete="email"></div>
      <div class="field"><label>Пароль</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()"></div>
      <button class="btn-primary" onclick="signIn()" id="login-btn">Увійти</button>
    </div>
    <div id="tab-register" style="display:none">
      <div class="field"><label>Ім'я та прізвище</label><input type="text" id="reg-name" placeholder="Марія Петренко"></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email"></div>
      <div class="field"><label>Пароль</label><input type="password" id="reg-pass" placeholder="Мінімум 6 символів" autocomplete="new-password" onkeydown="if(event.key==='Enter')signUp()"></div>
      <button class="btn-primary" onclick="signUp()" id="reg-btn">Зареєструватись</button>
    </div>
    <div id="auth-msg" class="auth-msg" style="display:none"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">🌸 <span>Квіткова Мафія</span></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="user-avatar" id="user-initials">?</div>
        <button onclick="signOut()" style="border:none;background:none;font-size:20px;cursor:pointer;color:var(--gray)">↩</button>
      </div>
    </div>
    <div id="store-pill-wrap"></div>
  </div>

  <!-- CHECKLIST PAGE -->
  <div class="page active" id="page-checklist">
    <div class="type-tabs">
      <div class="type-tab active" onclick="setType('open',this)">🌅 Відкриття</div>
      <div class="type-tab" onclick="setType('close',this)">🌙 Закриття</div>
      <div class="type-tab" onclick="setType('daily',this)">📋 Щоденні</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label" id="prog-text">0 з 0 виконано</span>
        <span class="progress-pct" id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div id="task-list"><div class="spinner"></div></div>
    <button class="add-task-btn" onclick="openAddModal()" id="add-btn" style="display:none">+ Додати задачу</button>
  </div>

  <!-- EMPLOYEES PAGE -->
  <div class="page" id="page-employees">
    <div id="emp-body"><div class="spinner"></div></div>
  </div>

  <!-- OVERVIEW PAGE (admin) -->
  <div class="page" id="page-overview">
    <div id="overview-body"><div class="spinner"></div></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="setPage('checklist',this)">
      <span class="nav-icon">✅</span><span class="nav-label">Чек-лист</span>
    </button>
    <button class="nav-btn" onclick="setPage('employees',this)">
      <span class="nav-icon">👥</span><span class="nav-label">Команда</span>
    </button>
    <button class="nav-btn" id="nav-overview" onclick="setPage('overview',this)" style="display:none">
      <span class="nav-icon">📊</span><span class="nav-label">Огляд</span>
    </button>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Нова задача</div>
    <input class="modal-input" id="task-input" placeholder="Назва задачі..." maxlength="120">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Скасувати</button>
      <button class="btn-add" onclick="addTask()">Додати</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://acouflypsopzzsocozhu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_bJa7B0FOO-oEvbiucn2pEQ_nvAEHi-S';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null, currentProfile = null, currentType = 'open', tasks = [];

// ── AUTH ──────────────────────────────────────────
function switchAuthTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
  hideAuthMsg();
}

function showAuthMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg; el.className = 'auth-msg ' + type; el.style.display = 'block';
}
function hideAuthMsg() { document.getElementById('auth-msg').style.display = 'none'; }

async function signIn() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { showAuthMsg('Введіть email та пароль', 'error'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Вхід...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { showAuthMsg('Невірний email або пароль', 'error'); btn.disabled = false; btn.textContent = 'Увійти'; return; }
  await loadUser(data.user);
}

async function signUp() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!name || !email || !pass) { showAuthMsg('Заповніть всі поля', 'error'); return; }
  if (pass.length < 6) { showAuthMsg('Пароль мінімум 6 символів', 'error'); return; }
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Реєстрація...';
  const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
  if (error) { showAuthMsg(error.message, 'error'); btn.disabled = false; btn.textContent = 'Зареєструватись'; return; }
  // create profile manually
  if (data.user) {
    await sb.from('profiles').upsert({ id: data.user.id, full_name: name, role: 'pending' });
  }
  showAuthMsg('✅ Акаунт створено! Очікуй призначення від адміна.', 'success');
  btn.disabled = false; btn.textContent = 'Зареєструватись';
}

async function signOut() { await sb.auth.signOut(); location.reload(); }

async function loadUser(user) {
  currentUser = user;
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile;
  if (!profile || profile.role === 'pending') { showWaitingScreen(); return; }
  initApp();
}

function showWaitingScreen() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('page-checklist').innerHTML = `
    <div class="waiting-screen">
      <div class="waiting-icon">⏳</div>
      <div class="waiting-title">Очікуй призначення</div>
      <div class="waiting-sub">Твій акаунт створено!<br>Адмін скоро призначить тобі заклад і роль.<br><br>Спробуй зайти пізніше.</div>
      <button class="btn-primary" style="margin-top:24px;max-width:200px" onclick="signOut()">Вийти</button>
    </div>`;
  document.querySelector('.bottom-nav').style.display = 'none';
  document.querySelector('.topbar').style.display = 'none';
}

function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const initials = (currentProfile?.full_name || currentUser.email).split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  document.getElementById('user-initials').textContent = initials;
  const storeName = currentProfile?.store_name || 'Заклад';
  document.getElementById('store-pill-wrap').innerHTML = `<span class="store-pill">📍 ${storeName}</span>`;
  const isAdmin = currentProfile?.role === 'admin';
  const isManager = currentProfile?.role === 'manager';
  if (isAdmin || isManager) {
    document.getElementById('nav-overview').style.display = 'flex';
  }
  document.getElementById('add-btn').style.display = (isAdmin || isManager) ? 'block' : 'none';
  loadTasks();
  loadEmployees();
}

// ── TASKS ──────────────────────────────────────────
async function loadTasks() {
  const storeId = currentProfile?.store_id;
  if (!storeId) { document.getElementById('task-list').innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Заклад не призначено</div></div>'; return; }
  const today = new Date().toISOString().split('T')[0];
  const { data } = await sb.from('tasks').select('*, completions(id,completed_at,user_id)').eq('store_id', storeId).eq('type', currentType).eq('is_active', true).order('sort_order');
  tasks = (data || []).map(t => ({
    ...t,
    done: t.completions?.some(c => c.completed_at?.startsWith(today)) || false,
    completion_id: t.completions?.find(c => c.completed_at?.startsWith(today))?.id || null
  }));
  renderTasks(tasks);
}

function renderTasks(list) {
  const done = list.filter(t => t.done).length, total = list.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-text').textContent = `${done} з ${total} виконано`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  const canEdit = currentProfile?.role !== 'staff';
  if (!list.length) { document.getElementById('task-list').innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Задач немає — додайте першу</div></div>'; return; }
  document.getElementById('task-list').innerHTML = list.map(t => `
    <div class="task-card">
      <div class="task-row" onclick="toggleTask(${t.id})">
        <div class="task-check${t.done ? ' done' : ''}"></div>
        <span class="task-text${t.done ? ' done' : ''}">${t.title}</span>
        ${canEdit ? `<span class="task-delete" onclick="event.stopPropagation();deleteTask(${t.id})">×</span>` : ''}
      </div>
    </div>`).join('');
}

async function toggleTask(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  const today = new Date().toISOString().split('T')[0];
  if (task.done) {
    if (task.completion_id) await sb.from('completions').delete().eq('id', task.completion_id);
    task.done = false; task.completion_id = null;
  } else {
    const { data } = await sb.from('completions').insert({ task_id: taskId, user_id: currentUser.id, completed_at: new Date().toISOString() }).select().single();
    task.done = true; task.completion_id = data?.id;
    if (tasks.every(t => t.done)) showToast('🎉 Всі задачі виконано!');
  }
  renderTasks(tasks);
}

async function deleteTask(taskId) {
  await sb.from('tasks').update({ is_active: false }).eq('id', taskId);
  tasks = tasks.filter(t => t.id !== taskId);
  renderTasks(tasks);
  showToast('Задачу видалено');
}

async function addTask() {
  const title = document.getElementById('task-input').value.trim();
  if (!title) return;
  const { data, error } = await sb.from('tasks').insert({ title, store_id: currentProfile.store_id, type: currentType, is_active: true, sort_order: tasks.length, created_by: currentUser.id }).select().single();
  if (!error) { closeModal(); tasks.push({ ...data, done: false }); renderTasks(tasks); showToast('Задачу додано ✅'); }
}

function setType(type, el) {
  currentType = type;
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('task-list').innerHTML = '<div class="spinner"></div>';
  loadTasks();
}

// ── EMPLOYEES ──────────────────────────────────────
async function loadEmployees() {
  const isAdmin = currentProfile?.role === 'admin';
  const isManager = currentProfile?.role === 'manager';
  const body = document.getElementById('emp-body');

  let query = sb.from('profiles').select('*, stores(name)');
  if (!isAdmin && !isManager) {
    query = query.eq('store_id', currentProfile?.store_id);
  }
  const { data: profiles } = await query.order('full_name');

  // pending users (no store assigned)
  const pending = (profiles || []).filter(p => p.role === 'pending' || !p.store_id);
  const active = (profiles || []).filter(p => p.role !== 'pending' && p.store_id);

  let html = '';

  if (isAdmin && pending.length > 0) {
    html += `<div class="section-title">⏳ Очікують призначення (${pending.length})</div>`;
    const { data: stores } = await sb.from('stores').select('id,name').eq('network', 'kvitkova');
    pending.forEach(p => {
      html += `<div class="pending-card">
        <div class="pending-email">${p.full_name || p.id}<br><span style="font-size:12px;color:var(--gray);font-weight:400">${p.full_name ? '' : 'Новий користувач'}</span></div>
        <div class="assign-row">
          <select class="assign-select" id="store-${p.id}">
            <option value="">Оберіть заклад</option>
            ${(stores || []).map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
          </select>
          <select class="assign-select" id="role-${p.id}" style="max-width:110px">
            <option value="staff">Працівник</option>
            <option value="manager">Менеджер</option>
            <option value="admin">Адмін</option>
          </select>
          <button class="btn-assign" onclick="assignUser('${p.id}')">✓</button>
        </div>
      </div>`;
    });
  }

  if (active.length > 0) {
    html += `<div class="section-title">Команда</div>`;
    active.forEach(p => {
      const initials = (p.full_name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      const roleLabel = { admin: 'Адмін', manager: 'Менеджер', staff: 'Працівник' }[p.role] || p.role;
      const badgeClass = { admin: 'badge-admin', manager: 'badge-manager', staff: 'badge-staff' }[p.role] || 'badge-pending';
      html += `<div class="emp-card">
        <div class="emp-avatar">${initials}</div>
        <div style="flex:1">
          <div class="emp-name">${p.full_name || 'Без імені'}</div>
          <div class="emp-role">📍 ${p.stores?.name || p.store_id || '—'}</div>
        </div>
        <span class="emp-badge ${badgeClass}">${roleLabel}</span>
      </div>`;
    });
  }

  if (!html) html = '<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Немає працівників</div></div>';
  body.innerHTML = html;
}

async function assignUser(userId) {
  const storeId = document.getElementById('store-' + userId)?.value;
  const role = document.getElementById('role-' + userId)?.value || 'staff';
  if (!storeId) { showToast('Оберіть заклад!'); return; }
  const { data: store } = await sb.from('stores').select('name').eq('id', storeId).single();
  await sb.from('profiles').update({ store_id: parseInt(storeId), store_name: store?.name, role }).eq('id', userId);
  showToast('✅ Призначено!');
  loadEmployees();
}

// ── OVERVIEW ──────────────────────────────────────
async function loadOverview() {
  const today = new Date().toISOString().split('T')[0];
  const { data: stores } = await sb.from('stores').select('id,name').eq('network', 'kvitkova');
  if (!stores) return;
  let html = `<div class="section-title">Сьогодні — ${new Date().toLocaleDateString('uk-UA',{day:'numeric',month:'long'})}</div>`;
  for (const store of stores) {
    const { data: allTasks } = await sb.from('tasks').select('id').eq('store_id', store.id).eq('is_active', true);
    const total = allTasks?.length || 0;
    const { data: done } = await sb.from('completions').select('task_id').in('task_id', (allTasks || []).map(t => t.id)).gte('completed_at', today);
    const doneCount = new Set((done || []).map(c => c.task_id)).size;
    const pct = total ? Math.round(doneCount / total * 100) : 0;
    const color = pct === 100 ? 'var(--green)' : pct > 50 ? 'var(--amber)' : 'var(--pink)';
    html += `<div class="overview-card">
      <div class="overview-header">
        <div class="overview-store">📍 ${store.name}</div>
        <div class="overview-pct" style="color:${color}">${pct}%</div>
      </div>
      <div class="mini-progress"><div class="mini-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="overview-stats">
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${doneCount}</div><div class="stat-lbl">виконано</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--amber)">${total - doneCount}</div><div class="stat-lbl">залишилось</div></div>
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">всього</div></div>
      </div>
    </div>`;
  }
  document.getElementById('overview-body').innerHTML = html;
}

// ── UI HELPERS ──────────────────────────────────────
function setPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'overview') loadOverview();
  if (name === 'employees') loadEmployees();
}

function openAddModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('task-input').value = '';
  setTimeout(() => document.getElementById('task-input').focus(), 300);
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────
sb.auth.getSession().then(({ data: { session } }) => {
  if (session?.user) loadUser(session.user);
});

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
</script>
</body>
</html>
